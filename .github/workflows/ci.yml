name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  quality:
    name: Lint, typecheck & tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Format check
        run: npm run format:check

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        env:
          IRIS_BASE_URL: ${{ secrets.IRIS_BASE_URL }}
          IRIS_CASE_TOKEN: ${{ secrets.IRIS_CASE_TOKEN }}
          IRIS_SUBJECT_PASSWORD: ${{ secrets.IRIS_SUBJECT_PASSWORD }}
          IRIS_JUNIOR_PASSWORD: ${{ secrets.IRIS_JUNIOR_PASSWORD }}
          IRIS_SENIOR_PASSWORD: ${{ secrets.IRIS_SENIOR_PASSWORD }}
          IRIS_DIRECTOR_PASSWORD: ${{ secrets.IRIS_DIRECTOR_PASSWORD }}
        run: npm test

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Upload test results JSON
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/
          retention-days: 14
